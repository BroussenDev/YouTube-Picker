<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Picker</title>
  <style>
    body {
      width: 280px;
      font-family: "Roboto", sans-serif;
      padding: 16px;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
    }

    h3 {
      margin: 0 0 15px 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Input recherche */
    #new-handle {
      width: 100%;
      padding: 10px 15px;
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      color: #fff;
      box-sizing: border-box;
      margin-bottom: 12px;
      outline: none;
    }
    #new-handle:focus { border-color: #3ea6ff; }

    /* Zone de preview quand on cherche */
    #preview {
      background: #272727;
      padding: 10px;
      border-radius: 12px;
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    /* Liste des mecs */
    #list {
      max-height: 280px;
      overflow-y: auto;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      border-radius: 12px;
      margin-bottom: 4px;
    }
    .channel-item:hover { background: #272727; }

    .channel-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .channel-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Checkbox custom */
    .custom-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #aaa;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    input[type="checkbox"]:checked + .custom-checkbox {
      background: #f00;
      border-color: #f00;
    }
    .custom-checkbox::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      display: none;
    }
    input[type="checkbox"]:checked + .custom-checkbox::after { display: block; }

    .delete-btn {
      color: #717171;
      cursor: pointer;
      font-size: 20px;
      padding: 0 5px;
    }
    .delete-btn:hover { color: #ff4e4e; }

    /* Filtre et Bouton */
    .filter-zone { margin: 15px 0; padding: 0 5px; }
    
    #time-filter {
      width: 100%;
      padding: 8px;
      background: #222;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      cursor: pointer;
    }

    #go {
      width: 100%;
      padding: 12px;
      background: #f00;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
    }
    #go:hover { background: #cc0000; }

    #add-btn {
      background: #fff;
      border: none;
      padding: 5px 12px;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f1f1f1;
      color: #000;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <h3>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#f00"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.016 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
    YouTube Picker
  </h3>
  
  <input type="text" id="new-handle" placeholder="Ajouter un @username...">

  <div id="preview">
    <img id="preview-img" class="channel-img">
    <span id="preview-name" class="channel-name"></span>
    <button id="add-btn">OK</button>
  </div>

  <div id="list"></div>

  <div class="filter-zone">
    <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px;">ANCIENNETÉ MAX</label>
    <select id="time-filter">
      <option value="all">Toutes les vidéos</option>
      <option value="year">Moins d'un an</option>
      <option value="2years">Moins de 2 ans</option>
      <option value="3years">Moins de 3 ans</option>
    </select>
  </div>

  <button id="go">LANCER UNE VIDÉO</button>

  <div id="toast"></div>

  <div style="text-align: center; margin-top: 15px;">
  <a href="https://www.broussen.fr" target="_blank" style="color: #717171; text-decoration: none; font-size: 11px;">by Broussen.fr</a>
</div>

  <script src="popup.js"></script>
</body>
</html>
